[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
# sqlalchemy.url is intentionally unset here; migrations/env.py reads it from
# app.core.config.settings (keep this file ASCII-only: alembic reads it with the OS locale encoding).

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
